{% extends 'base.html' %}
{% block title %}Новый пароль — Трекер{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Новый пароль</h4>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input name="password" type="password" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Пароль ещё раз</label>
            <input name="password2" type="password" class="form-control" required>
          </div>
          <button class="btn btn-primary w-100">Сохранить</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
