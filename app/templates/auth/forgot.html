{% extends 'base.html' %}
{% block title %}Восстановление пароля — Трекер{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Восстановление пароля</h4>
        <p class="text-muted">Укажи почту — пришлём ссылку для сброса пароля.</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Почта</label>
            <input name="email" type="email" class="form-control" required autofocus>
          </div>
          <button class="btn btn-primary w-100">Отправить ссылку</button>
        </form>
        <div class="mt-3 text-center">
          <a href="{{ url_for('auth.login') }}">Вернуться ко входу</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
